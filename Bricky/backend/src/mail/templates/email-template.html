<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Нова заявка в Bricky</title>
  <style>
    body {
      background-color: #f6f6f6;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      background: #ffffff;
      margin: 30px auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    .header {
      background-color: #b7410e;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      letter-spacing: 1px;
    }
    .content {
      padding: 25px 30px;
      color: #333;
      line-height: 1.6;
    }
    .content h2 {
      margin-top: 0;
      color: #b7410e;
    }
    .footer {
      background: #f1f1f1;
      text-align: center;
      padding: 15px;
      font-size: 13px;
      color: #666;
    }
    .brick {
      color: #b7410e;
      font-weight: 600;
    }
    .button {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #b7410e;
      color: white !important;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">🔔 Нова заявка в Bricky</div>
    <div class="content">
      <h2>Имате нова заявка от клиент</h2>
      <p><strong>Име:</strong> {{name}}</p>
      <p><strong>Имейл:</strong> {{email}}</p>
      <p><strong>Телефон:</strong> {{phone}}</p>
      <p><strong>Описание на ремонта:</strong></p>
      <p style="background:#f6f6f6; padding:10px; border-radius:8px;">{{description}}</p>
      <a href="https://bricky.bg" class="button">Отвори в Bricky</a>
    </div>
    <div class="footer">
      © 2025 <span class="brick">Bricky</span> | Свързвай хора и майстори с доверие.
    </div>
  </div>
</body>
</html>
